<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ClienteHub{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a32;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.15);
      --text: #e8e6e0;
      --text-muted: #7a7880;
      --text-dim: #4a4856;
      --success: #4caf82;
      --warning: #e8a94c;
      --danger: #e85c4c;
      --info: #4c8ce8;
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 64px;
    }

    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .nav-brand span {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      display: block;
      line-height: 1;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 0.25rem;
      list-style: none;
      flex: 1;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 0.875rem;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--text);
      background: var(--surface2);
    }

    .nav-links a.active { color: var(--gold); }

    .nav-cta {
      background: var(--gold) !important;
      color: var(--bg) !important;
      font-weight: 600 !important;
      padding: 0.5rem 1.2rem !important;
    }
    .nav-cta:hover { background: var(--gold-light) !important; }

    /* ── MESSAGES ── */
    .messages-container {
      max-width: 1200px;
      margin: 1.5rem auto 0;
      padding: 0 2rem;
    }

    .message {
      padding: 0.875rem 1.25rem;
      border-radius: var(--radius-sm);
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      border-left: 3px solid;
      animation: slideIn 0.3s ease;
    }

    .message.success { background: rgba(76,175,130,0.1); border-color: var(--success); color: #a8e6c8; }
    .message.warning { background: rgba(232,169,76,0.1); border-color: var(--warning); color: #f0d09a; }
    .message.error   { background: rgba(232,92,76,0.1);  border-color: var(--danger);  color: #f0a89a; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      width: 100%;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      margin-bottom: 2.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .page-header p {
      color: var(--text-muted);
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: var(--border); }

    .card-gold {
      border-color: rgba(201,168,76,0.3);
      background: linear-gradient(135deg, var(--surface) 0%, rgba(201,168,76,0.05) 100%);
    }

    /* ── STATS GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: var(--gold);
    }

    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    /* ── TABLE ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background: var(--surface2);
      padding: 0.875rem 1rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    tbody td {
      padding: 0.875rem 1rem;
      color: var(--text);
      vertical-align: middle;
    }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-gold  { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .badge-green { background: rgba(76,175,130,0.12); color: var(--success); }
    .badge-blue  { background: rgba(76,140,232,0.12); color: var(--info); }
    .badge-gray  { background: var(--surface2); color: var(--text-muted); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--bg);
      font-weight: 600;
    }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); background: var(--surface2); }

    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }

    /* ── FORMS ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 600px;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      appearance: none;
    }

    .form-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .form-input::placeholder { color: var(--text-dim); }

    select.form-input { cursor: pointer; }

    textarea.form-input { resize: vertical; min-height: 80px; }

    .errorlist {
      list-style: none;
      margin-top: 0.4rem;
    }

    .errorlist li {
      color: var(--danger);
      font-size: 0.8rem;
    }

    .form-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.75rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    /* ── SEARCH ── */
    .search-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .search-bar .form-input { flex: 1; font-size: 1rem; padding: 0.875rem 1.25rem; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    .empty-state h3 { font-size: 1.1rem; color: var(--text-dim); margin-bottom: 0.5rem; }
    .empty-state p  { font-size: 0.875rem; margin-bottom: 1.5rem; }

    /* ── DETAIL ── */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.875rem;
      margin-bottom: 1.5rem;
    }

    .detail-item { }
    .detail-item .key {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 0.2rem;
    }
    .detail-item .val {
      color: var(--text);
      font-size: 0.95rem;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    footer span { color: var(--gold); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-inner { padding: 0 1rem; }
      .nav-links { display: none; }
      main { padding: 1.5rem 1rem; }
      .detail-grid { grid-template-columns: 1fr; }
      .page-header { flex-direction: column; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="{% url 'home' %}" class="nav-brand">
      ClienteHub
      <span>Sistema de Gestión</span>
    </a>
    <ul class="nav-links">
      <li><a href="{% url 'home' %}">🏠 Inicio</a></li>
      <li><a href="{% url 'lista_clientes' %}">👤 Clientes</a></li>
      <li><a href="{% url 'lista_premium' %}">⭐ Premium</a></li>
      <li><a href="{% url 'lista_compras' %}">🛒 Compras</a></li>
      <li><a href="{% url 'buscar_cliente' %}">🔍 Buscar</a></li>
    </ul>
    <a href="{% url 'nuevo_cliente' %}" class="btn btn-primary btn-sm nav-cta">+ Nuevo Cliente</a>
  </div>
</nav>

{% if messages %}
<div class="messages-container">
  {% for message in messages %}
    <div class="message {{ message.tags }}">{{ message }}</div>
  {% endfor %}
</div>
{% endif %}

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  Desarrollado por <span>Sofía Algamiz</span> · Coderhouse Python · 2025
</footer>

</body>
</html>
